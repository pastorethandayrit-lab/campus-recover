<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusRecover | Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>CampusRecover</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Report</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="login.html">Sign In</a></li>
      <li><a href="register.html" class="active">Register</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
  </nav>

  <main class="dashboard">
    <section class="form-section">
      <form id="registerForm">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Create Account</h2>
        
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your university email" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create a strong password" required>
        </div>
        
        <div class="form-actions" style="margin-top: 1.5rem;">
          <button type="submit" class="btn-approve" style="width: 100%; padding: 12px; background: #facc15; color: #222;">Register</button>
        </div>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #666; line-height: 1.4;">
          By signing up, you agree to our <br>
          <a href="#" style="color: #222; text-decoration: underline;">Terms of Service</a> and 
          <a href="#" style="color: #222; text-decoration: underline;">Privacy Policy</a>.
        </p>

        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
          Already have an account? <a href="login.html" style="color: #facc15; font-weight: bold; text-decoration: none;">Sign In</a>
        </p>
      </form>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
