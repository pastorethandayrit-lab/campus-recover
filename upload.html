<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusRecover | Report Item</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <h1>CampusRecover</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Report</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="login.html">Sign In</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
  </nav>

  <section class="form-section">
    <form id="uploadForm">
      <h2>Report an Item</h2>
      <div class="form-group">
        <label>Select Type</label>
        <select required>
          <option value="">-- Select --</option>
          <option value="lost">Lost (I lost something)</option>
          <option value="found">Found (I found something)</option>
        </select>
      </div>
      <div class="form-group">
        <label>Item Title</label>
        <input type="text" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select required>
          <option value="">-- Select Category --</option>
          <option value="electronics">Electronics</option>
          <option value="accessories">Accessories</option>
          <option value="books">Books</option>
          <option value="others">Others</option>
        </select>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea required></textarea>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" required>
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" required>
      </div>
      <div class="form-group">
        <label>Item Image</label>
        <input type="file" id="itemImage" accept="image/*" required>
      </div>
      <div class="form-actions">
        <button type="button" class="secondary">Cancel</button>
        <button type="submit" class="primary">Submit Report</button>
      </div>
    </form>
  </section>

  <!-- Link your upload.js here -->
  <script type="module" src="upload.js"></script>
</body>
</html>
