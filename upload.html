<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusRecover | Report</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>CampusRecover</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html" class="active">Report</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
  </nav>

  <main class="dashboard">
    <section class="form-section">
      <form id="uploadForm">
        <h2 style="text-align: center; margin-bottom: 2rem;">Report an Item</h2>
        
        <div class="form-group">
          <label>Type</label>
          <select required>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
          </select>
        </div>

        <div class="form-group">
          <label>Item Title</label>
          <input type="text" placeholder="e.g. Blue Wallet" required>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select required>
            <option value="electronics">Electronics</option>
            <option value="books">Books</option>
            <option value="others">Others</option>
          </select>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea placeholder="Details..." required style="height: 100px; resize: none;"></textarea>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" placeholder="Where was it?" required>
        </div>

        <div class="form-group">
          <label>Date</label>
          <input type="date" required>
        </div>

        <div class="form-group">
          <label>Item Image</label>
          <input type="file" accept="image/*" required>
        </div>

        <button type="submit" class="btn-approve">Submit Report</button>
      </form>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
