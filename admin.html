<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusRecover | Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>CampusRecover</h1>
    <ul></ul>
  </nav>

  <section id="adminSection" style="display:none;" class="dashboard">
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
      <div style="flex:1; background:#2563eb; color:white; padding:15px; border-radius:8px; text-align:center;">
        <small>Total</small><h2 id="adminTotal" style="margin:0;">0</h2>
      </div>
      <div style="flex:1; background:#ef4444; color:white; padding:15px; border-radius:8px; text-align:center;">
        <small>Lost</small><h2 id="adminLost" style="margin:0;">0</h2>
      </div>
      <div style="flex:1; background:#10b981; color:white; padding:15px; border-radius:8px; text-align:center;">
        <small>Found</small><h2 id="adminFound" style="margin:0;">0</h2>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Item</th>
            <th>Admin Note</th>
            <th>Location</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminTableBody"></tbody>
      </table>
    </div>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
