<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus-Recover | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navbar identical to Home -->
  <nav class="bg-yellow-400 text-white p-4 flex justify-between items-center shadow">
    <h1 class="text-xl font-bold">Campus-Recover</h1>
    <ul class="flex space-x-4">
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Upload Item</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>

  <section class="flex items-center justify-center min-h-screen bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-lg w-96">
      <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
      <form id="loginForm" class="space-y-4">
        <input type="email" placeholder="Email" required class="w-full p-3 border rounded">
        <input type="password" placeholder="Password" required class="w-full p-3 border rounded">
        <button type="submit" class="w-full bg-yellow-400 text-white py-3 rounded hover:bg-yellow-500 transition">Login</button>
      </form>
      <button id="logoutBtn" class="w-full mt-4 bg-gray-300 text-gray-700 py-2 rounded hover:bg-gray-400 transition">Logout</button>
    </div>
  </section>
</body>
<script src="script.js"></script>
</html>
