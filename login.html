<!DOCTYPE html>
<html lang="en">

  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>CampusRecover</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Report</a></li>

      <li><a href="login.html" class="active">Sign In</a></li>
      <li><a href="profile.html">Profile</a></li>

  <main class="dashboard"> 
    <section class="form-section">
      <form id="loginForm">
        <h2 style="text-align: center; margin-bottom: 1.5rem;">Sign In</h2>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-approve">Login</button>
        <p style="text-align:center; margin-top:1rem;">New? <a href="register.html">Register here</a></p>
      </form>
    </section>
  </main>
  <script type="module" src="script.js"></script>
</body>
</html>
