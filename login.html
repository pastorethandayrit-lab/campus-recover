<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusRecover | Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>CampusRecover</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Report</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="login.html" class="active">Sign In</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
  </nav>

  <main class="dashboard"> 
    <section class="form-section">
      <form id="loginForm">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Welcome Back</h2>
        
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="email@example.com" required>
        </div>
        
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required>
        </div>
        
        <div class="form-actions" style="display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem;">
          <button type="submit" class="btn-approve" style="width: 100%; padding: 12px;">Login</button>
          <button id="logoutBtn" type="button" class="btn-delete" style="width: 100%; padding: 12px; background: #666;">Logout</button>
        </div>
        
        <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem;">
          Don't have an account? <a href="register.html" style="color: #facc15; font-weight: bold; text-decoration: none;">Register here</a>
        </p>
      </form>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
