<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CampusRecover | Profile</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Specific styles for the Profile Avatar to make it look modern */
    .profile-avatar {
      width: 80px;
      height: 80px;
      background: #facc15;
      color: #222;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      margin: 0 auto 1.5rem;
      box-shadow: 0 4px 10px rgba(250, 204, 21, 0.3);
    }
    .profile-card {
      text-align: center;
      padding: 2.5rem;
    }
    .profile-info {
      text-align: left;
      background: #f9fafb;
      padding: 1.5rem;
      border-radius: 8px;
      margin-bottom: 2rem;
    }
    .profile-info p {
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>CampusRecover</h1>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="upload.html">Report</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li><a href="login.html">Sign In</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="profile.html" class="active">Profile</a></li>
    </ul>
  </nav>

  <main class="dashboard">
    <section class="form-section">
      <div class="profile-card card" style="max-width: 450px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        
        <div class="profile-avatar" id="avatarCircle">
          <span id="avatarText">U</span>
        </div>

        <h2 style="margin-bottom: 1.5rem;">Your Account</h2>
        
        <div class="profile-info">
          <p><strong>Email:</strong> <span id="userEmail" style="color: #555;">Loading...</span></p>
          <p><strong>Role:</strong> <span id="userRole" class="status-tag approved" style="display: inline-block;">User</span></p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
          <button id="logoutBtn" class="btn-delete" style="width: 100%; padding: 12px;">Logout from Account</button>
          <a href="index.html" style="text-decoration: none; color: #666; font-size: 0.9rem;">Back to Home</a>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
